<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            line-height: 1.6;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .joke-text {
            font-weight: 500;
        }

        .setup {
            margin-bottom: 15px;
            font-style: italic;
        }

        .punchline {
            margin-top: 15px;
            font-weight: bold;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }

        .joke-type {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .counter {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh!</p>

        <div class="joke-box" id="jokeBox">
            Click the button below to get your first joke!
        </div>

        <button onclick="fetchJoke()" id="jokeBtn">Get a Joke</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching a joke for you...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="counter" id="counter"></div>
    </div>

    <script>
        let jokeCount = 0;

        async function fetchJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const button = document.getElementById('jokeBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            button.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';

            try {
                // Using Official Joke API
                const response = await fetch('https://official-joke-api.appspot.com/jokes/random');

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const joke = await response.json();

                // Display the joke
                if (joke.type === 'single') {
                    jokeBox.innerHTML = `<div class="joke-text">${joke.joke}</div>`;
                } else {
                    jokeBox.innerHTML = `
                        <div>
                            <div class="setup">${joke.setup}</div>
                            <div class="punchline">${joke.punchline}</div>
                        </div>
                    `;
                }

                jokeCount++;
                updateCounter();
            } catch (err) {
                jokeBox.innerHTML = 'Something went wrong!';
                error.style.display = 'block';
                error.textContent = `Error: ${err.message}. Please try again!`;
                console.error('Error fetching joke:', err);
            } finally {
                button.disabled = false;
                loading.style.display = 'none';
            }
        }

        function updateCounter() {
            const counter = document.getElementById('counter');
            counter.textContent = `Jokes loaded: ${jokeCount}`;
        }

        // Optional: Load a joke when page loads
        window.addEventListener('load', () => {
            fetchJoke();
        });
    </script>
</body>
</html>
